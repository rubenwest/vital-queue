<article class="patient-row" [attr.data-triage]="patient().triageLevel" role="row">
  <div class="patient-row__triage">
    <span class="triage-badge" [attr.data-level]="patient().triageLevel" aria-label="Triage level">
      L{{ patient().triageLevel }}
    </span>
    <select
      #triageSelect
      class="triage-select"
      [value]="patient().triageLevel"
      (change)="onTriageChange(triageSelect.value)"
      [attr.aria-label]="'Change triage level for ' + patient().name"
    >
      @for (level of triageLevels; track level) {
        <option [value]="level">{{ triageLabels[level] }}</option>
      }
    </select>
  </div>

  <div class="patient-row__info">
    <span class="patient-row__name">{{ patient().name }}</span>
    <span class="patient-row__meta">Age {{ patient().age }} · {{ patient().chiefComplaint }}</span>
  </div>

  <div class="patient-row__waiting" aria-live="polite" aria-label="Waiting time">
    <span class="waiting-label">Waiting</span>
    <span class="waiting-time">{{ patient().arrivalTime | waitingTime }}</span>
  </div>

  <div class="patient-row__actions">
    <button
      class="btn btn--admit"
      type="button"
      (click)="admit.emit()"
      [attr.aria-label]="'Admit ' + patient().name"
    >
      Admit
    </button>
    <button
      class="btn btn--discharge"
      type="button"
      (click)="discharge.emit()"
      [attr.aria-label]="'Discharge ' + patient().name"
    >
      Discharge
    </button>
  </div>
</article>
